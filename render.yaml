# ─────────────────────────────────────────────────────────────────────
#  One-click browser deploy (Render Blueprint). No terminal, ever.
#
#  Creates THREE things:
#    1. afs-leads-db      — Postgres database (free to start)
#    2. afs-dashboard     — the website you open (free)
#    3. afs-engine-worker — always-on worker that finds leads every
#                           morning, sends the sequence, emails the
#                           digest. This is the "automatic" piece and
#                           needs a paid instance (~$7/mo); workers
#                           cannot run on Render's free tier.
#
#  It runs SAMPLE data until you paste a GOOGLE_MAPS_API_KEY into the
#  worker's Environment in the Render dashboard — then it automatically
#  switches to REAL Egyptian leads. No code change.
# ─────────────────────────────────────────────────────────────────────
databases:
  - name: afs-leads-db
    plan: free
    databaseName: afs_leads
    user: afs
    region: frankfurt        # EU region — closest Render option to Egypt

services:
  # ── The website you open in your browser ──
  - type: web
    name: afs-dashboard
    runtime: node
    plan: free
    region: frankfurt
    branch: claude/afs-lead-engine-Yi83k
    buildCommand: >
      cd lead-engine && npm install --include=dev --no-audit --no-fund &&
      cd ../dashboard && npm install --include=dev --no-audit --no-fund &&
      npm run build
    # On first boot, set up the DB + a sample so the site is never empty.
    startCommand: >
      cd lead-engine &&
      (npm run migrate && npm run seed && npm run pipeline -- --mode=sample && npm run digest || true) &&
      cd ../dashboard && npm run start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afs-leads-db
          property: connectionString
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PIPELINE_MODE
        value: sample
      - key: TZ
        value: Africa/Cairo

  # ── The always-on engine: this is what makes it AUTOMATIC ──
  - type: worker
    name: afs-engine-worker
    runtime: node
    plan: starter            # workers require a paid plan (~$7/mo)
    region: frankfurt
    branch: claude/afs-lead-engine-Yi83k
    buildCommand: >
      cd lead-engine && npm install --include=dev --no-audit --no-fund
    # Migrate, then run forever: daily discovery 06:00, outreach queue
    # every 30 min, digest 07:00 — all Africa/Cairo.
    startCommand: >
      cd lead-engine && npm run migrate && npm run cron
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afs-leads-db
          property: connectionString
      - key: NODE_VERSION
        value: "22"
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      # 'auto' = live as soon as a Google key is present, else sample.
      - key: PIPELINE_MODE
        value: auto
      - key: MONTHLY_BUDGET_USD
        value: "200"
      - key: TZ
        value: Africa/Cairo
      # Paste these in the Render dashboard when ready (optional):
      - key: GOOGLE_MAPS_API_KEY   # ← add this to get REAL leads
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: ANTHROPIC_API_KEY     # ← add for Claude-written outreach
        sync: false
      - key: RESEND_API_KEY        # ← add to actually send emails
        sync: false
      - key: OUTREACH_LIVE_SEND
        value: "false"
      - key: AFS_FROM_EMAIL
        sync: false
      - key: AFS_OWNER_EMAIL       # ← where the 7AM digest is emailed
        sync: false
