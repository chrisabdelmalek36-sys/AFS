name: AFS Lead Engine — daily auto run

# Free, scheduled discovery + outreach + digest.
# Vercel's built-in Cron Job (vercel.json) already covers the daily
# news refresh inside the deployed app. THIS workflow runs the FULL
# pipeline (OSM + news + tenders + outreach + digest) once a day
# against the same hosted database. Also manually triggerable from the
# Actions tab.
#
# NOTE: GitHub only fires scheduled workflows on the default branch.
# For automatic running, this file must reach main.
#
# Required repo secret:   DATABASE_URL    (your hosted Postgres URL)
# Optional repo secrets:  GOOGLE_MAPS_API_KEY, NEWSAPI_KEY,
#                         ANTHROPIC_API_KEY, RESEND_API_KEY,
#                         AFS_OWNER_EMAIL, AFS_FROM_EMAIL,
#                         OUTREACH_LIVE_SEND, MONTHLY_BUDGET_USD

on:
  schedule:
    - cron: "0 4 * * *"        # 04:00 UTC ≈ Cairo morning
  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        type: choice
        default: live
        options: [live, sample]

concurrency:
  group: lead-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      OUTREACH_LIVE_SEND: ${{ secrets.OUTREACH_LIVE_SEND }}
      AFS_FROM_EMAIL: ${{ secrets.AFS_FROM_EMAIL }}
      AFS_OWNER_EMAIL: ${{ secrets.AFS_OWNER_EMAIL }}
      MONTHLY_BUDGET_USD: ${{ secrets.MONTHLY_BUDGET_USD }}
      TZ: Africa/Cairo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Guard — DATABASE_URL must be set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Add a DATABASE_URL repo secret (your hosted Postgres URL)."
            exit 1
          fi

      - name: Install
        run: npm install --include=dev --no-audit --no-fund

      - name: Migrate database
        run: npm run migrate

      - name: Discover leads (mode=${{ github.event.inputs.mode || 'live' }})
        run: npm run pipeline -- --mode=${{ github.event.inputs.mode || 'live' }}

      - name: Process outreach queue
        run: npm run outreach

      - name: Build & send daily digest
        run: npm run digest

      - name: Summary
        run: npm run leads
